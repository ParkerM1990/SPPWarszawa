* {

html, body {

async function checkAuth(){

  const { data } = await supabaseClient.auth.getSession();

  if(data.session){

    document.getElementById("authBox").style.display = "none";

    // ✅ NAJPIERW pobierz profil
    const { data: profile } = await supabaseClient
      .from("users")
      .select("*")
      .eq("id", data.session.user.id)
      .single();

    window.currentUser = profile;

    // ✅ dopiero teraz używaj profile
    const fullName = profile?.first_name
      ? profile.first_name + " " + (profile.last_name || "")
      : data.session.user.email;

    document.getElementById("userBadge").innerText = "👤 " + fullName.trim();

    applyUserRole(profile);
    await init();
    
// ✅ RESET widoku
showSection('mapSection');

  }else{
    document.getElementById("authBox").style.display = "flex";
  }
}
  

async function logout(){

  await supabaseClient.auth.signOut();

  document.getElementById("authBox").style.display = "flex";
  document.getElementById("userBadge").innerText = "";

  window.currentUser = null; // ✅ dodatkowe bezpieczeństwo

  showSection('mapSection');
}
function renderAdminPanel(){

function hasAccessToParkomat(p){

  // ✅ admin widzi wszystko
  if(window.currentUser?.role === "admin") return true;

  const userStructures = window.currentUser?.structures || [];
  const userNodes = window.currentUser?.nodes || [];

  // ✅ brak przypisanych struktur = brak dostępu
  if(userStructures.length && !userStructures.includes(p.structure)) return false;

  // ✅ brak przypisanych stref = brak dostępu

}

function parseLocalDate(dateStr){
  if(!dateStr) return null;

  const fixed = dateStr.replace(" ", "T");
  const d = new Date(fixed);

  return isNaN(d) ? null : d;
}
function getLocalDateTime(){
  const now = new Date();

  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');

  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');

  return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}
  function formatDateForDB(date){
  if(!date) return null;

  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');

  const hh = String(date.getHours()).padStart(2,'0');
  const mm = String(date.getMinutes()).padStart(2,'0');
  const ss = String(date.getSeconds()).padStart(2,'0');

  return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}
function toLocalDateInput(date){
  const offset = date.getTimezoneOffset();
  const local = new Date(date.getTime() - offset*60000);
  return local.toISOString().slice(0,10);
}

/* ===== CSV ===== */
function parseCSV(text){
  const rows=[];
  const lines=text.replace(/^\uFEFF/,"").split(/\r?\n/);
  for(let line of lines){
    if(!line.trim()) continue;
    rows.push(line.split(",").map(v=>v.replace(/^"|"$/g,"")));
  }
  return rows;
}

function isValidEmail(email){
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function renderMarkers(){

  const node=document.getElementById("nodeFilter").value;
  markerLayer.clearLayers();

  let points=[];

 

Object.keys(activeEvents).forEach(key => {

  const p = allParkomaty[key];
  if(!p) return;
  if(!hasAccessToParkomat(p)) return;
  if(node && p.node!==node) return;

  let popup = `<b>Parkomat ${p.id}</b><br>${p.location}<br><br>`;

  

activeEvents[key].forEach(e=>{
  popup+=`
    • <b>${e.hardware || "Inne"}</b> – ${e.name}<br>
    <small>${e.date}</small><br>
  `;

  });

  popup+=`
    <br>
    <a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}"
       target="_blank"
       style="background:#16a34a;color:white;padding:6px 10px;border-radius:6px;text-decoration:none;">
       🧭 Nawiguj
    </a>
  `;

  // ✅ 👉 DODAJ TO TU
  const codes = activeEvents[key].map(e => (e.code ? String(e.code).trim() : ""));
  const hasCritical = codes.some(code => RED_CODES.includes(code));

  // ✅ marker
  const icon = L.divIcon({
    className: '',
    html: `
      <div style="
        width:22px;
        height:22px;
        border-radius:50%;
        background:${hasCritical ? '#dc2626' : '#16a34a'};
        border:2px solid white;
        box-shadow:0 0 8px rgba(0,0,0,0.6);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:12px;
        color:white;
        font-weight:bold;
      ">
        ${activeEvents[key].length}
      </div>
    `
  });

  L.marker([p.lat,p.lng], { icon })
    .bindPopup(popup)
    .addTo(markerLayer);

  points.push([p.lat,p.lng]);
});


  if(points.length===0){
    map.setView([52.2297,21.0122],6);
  }
  else if(points.length===1){
    map.setView(points[0],15);
  }
  else{
    map.fitBounds(L.latLngBounds(points),{
      padding:[50,50],
      maxZoom:16
    });
  }
}

 function renderInterStats(){

  const from = document.getElementById("statsFrom").value;
  const to = document.getElementById("statsTo").value;

  let stats = {};

  interwencje.forEach(i => {

    
const d = parseLocalDate(i.start_date);
if(!d) return;

    // filtr czasu
    if(from){
      const f = new Date(from + "T00:00:00");
      if(d < f) return;
    }

    if(to){
      const t = new Date(to + "T23:59:59");
      if(d > t) return;
    }

    const user = i.user_email || "Brak";

    if(!stats[user]){
      stats[user] = {
        total: 0,
        actions: {},
        wymiany: {}
      };
    }

    stats[user].total++;

    const actions = Array.isArray(i.actions)
      ? i.actions
      : (i.actions || "").split(",").map(s => s.trim());

    actions.forEach(a => {

      const low = a.toLowerCase();

      // wszystkie czynności
      stats[user].actions[a] = (stats[user].actions[a] || 0) + 1;

      // wymiany
      if(low.startsWith("wymiana")){
        const item = a.replace("Wymiana ", "");
        stats[user].wymiany[item] = (stats[user].wymiany[item] || 0) + 1;
      }
    });
  });

  let html = "";

  Object.keys(stats).forEach(user => {

    const s = stats[user];

    html += `
      <div class="terminal-box">

        <b>👤 ${user}</b><br>
        <small>Interwencji: ${s.total}</small><br><br>

        <b>🔧 Wymiany:</b>
        <ul>
          ${Object.entries(s.wymiany)
            .sort((a,b)=>b[1]-a[1])
            .map(([k,v])=>`<li>${k}: ${v}</li>`)
            .join("")}
        </ul>

        <b>⚙️ Wszystkie czynności:</b>
        <ul>
          ${Object.entries(s.actions)
            .sort((a,b)=>b[1]-a[1])
            .map(([k,v])=>`<li>${k}: ${v}</li>`)
            .join("")}
        </ul>

      </div>
    `;
  });

  document.getElementById("interwencjeList").innerHTML = html;
}

function setDateRange(type){

  const from = document.getElementById("statsFrom");
  const to = document.getElementById("statsTo");

  const now = new Date();

  if(type === "today"){
    from.value = toLocalDateInput(now);
    to.value = toLocalDateInput(now);
  }

  if(type === "week"){
    const past = new Date();
    past.setDate(now.getDate() - 7);

    from.value = toLocalDateInput(past);
    to.value = toLocalDateInput(now);
  }

  if(type === "month"){
    const start = new Date(now.getFullYear(), now.getMonth(), 1);

    from.value = toLocalDateInput(start);
    to.value = toLocalDateInput(now);
  }

  if(type === "prevMonth"){
    const start = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const end = new Date(now.getFullYear(), now.getMonth(), 0);

    from.value = toLocalDateInput(start);
    to.value = toLocalDateInput(end);
  }

  renderInterStats();
}

async function openEditUser(id){

  editingUserId = id;

  const { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("id", id)
    .single();

  document.getElementById("editFirstName").value = data.first_name || "";
  document.getElementById("editLastName").value = data.last_name || "";
  document.getElementById("editRole").value = data.role;

  const structures = [...new Set(
    Object.values(allParkomaty).map(p => p.structure)
  )];

  document.getElementById("editStructures").innerHTML =
    structures.map(s => `
      <label>
        <input type="checkbox" value="${s}"
        ${data.structures?.includes(s) ? "checked" : ""}>
        ${s}
      </label>
    `).join("");

  const nodes = [...new Set(
    Object.values(allParkomaty).map(p => p.node).filter(Boolean)
  )];

  document.getElementById("editNodes").innerHTML =
    nodes.map(n => `
      <label>
        <input type="checkbox" value="${n}"
        ${data.nodes?.includes(n) ? "checked" : ""}>
        ${n}

}

async function saveUserEdit(){

  const first = document.getElementById("editFirstName").value;
  const last = document.getElementById("editLastName").value;
  const role = document.getElementById("editRole").value;

  const structures = [...document.querySelectorAll("#editStructures input:checked")]
    .map(el => el.value);

  const nodes = [...document.querySelectorAll("#editNodes input:checked")]
    .map(el => el.value);

  await supabaseClient
    .from("users")
    .update({
      first_name: first,
      last_name: last,
      role: role,
      structures: structures,
      nodes: nodes
    })
    .eq("id", editingUserId);

  closeEditModal();
  loadUsers();
}
