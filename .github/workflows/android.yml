name: Build APK

on:
  workflow_dispatch:

concurrency:
  group: build-apk
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Create capacitor config
        run: |
          echo '{
            "appId": "com.sppwarszawa.app",
            "appName": "SPP Warszawa",
            "webDir": "www",
            "server": {
              "url": "https://parkerm1990.github.io/SPPWarszawa/",
              "cleartext": true
            }
          }' > capacitor.config.json

      # ✅ POPRAWIONE WCIĘCIA
      - name: Prepare www folder
        run: |
          rm -rf www
          mkdir www
          cp index.html www/
          cp manifest.json www/ || true

      - name: Init Capacitor
        run: npx cap init

      - name: Add Android
        run: npx cap add android

      - name: Copy project
        run: npx cap copy

      - name: Clean Gradle cache
        run: rm -rf ~/.gradle/caches/

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SPPWarszawa-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
``
